name: Assignment Limit Enforcer

on:
  issues:
    types: [assigned]

permissions:
  issues: write

jobs:
  check-assignments:
    runs-on: ubuntu-latest
    steps:
      - name: Check user assignments
        uses: actions/github-script@v7
        with:
          script: |
            const assignee = context.payload.assignee.login;
            const issueNumber = context.payload.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const MAX_ISSUES = 3;

            // Fetch open issues assigned to the user
            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              assignee,
              state: 'open'
            });

            // Filter out pull requests (GitHub API treats PRs as issues, but pull_request object exists if it's a PR)
            const actualIssues = issues.filter(issue => !issue.pull_request);

            if (actualIssues.length > MAX_ISSUES) {
              console.log(`User ${assignee} has ${actualIssues.length} issues. Unassigning from #${issueNumber}.`);
              
              // Unassign the user
              await github.rest.issues.removeAssignees({
                owner,
                repo,
                issue_number: issueNumber,
                assignees: [assignee]
              });

              // Leave a polite comment
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: `👋 Hey @${assignee}! You cannot get more assignments at the moment because you have reached the limit. Please complete your previous assigned issues to get a new one! 🚀`
              });
            } else {
              console.log(`User ${assignee} has ${actualIssues.length} issues. Within limits.`);
            }
